<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Kiroku</title>
    <meta
      name="description"
      content="Track your drinking sessions and build healthier habits." />
    <meta name="theme-color" content="#0D1117" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kiroku" />
    <meta property="og:url" content="https://app.kiroku.cz" />
    <meta property="og:title" content="Kiroku" />
    <meta
      property="og:description"
      content="Track your drinking sessions and build healthier habits." />
    <meta
      property="og:image"
      content="https://app.kiroku.cz/og-preview-image.png" />
    <link rel="stylesheet" type="text/css" href="/css/fonts.css" />
    <!-- Do not index the staging site -->
    <% if (htmlWebpackPlugin.options.isStaging) { %>
    <meta name="robots" content="noindex, nofollow" />
    <% } %>

    <style>
      html,
      body,
      #root,
      #root > div,
      #root > div > div {
        height: 100% !important;
      }
      * {
        touch-action: pan-x pan-y;
      }
      body {
        overflow: hidden;
        touch-action: none;
      }
      input::placeholder {
        user-select: none;
        -webkit-user-select: none;
      }
      .disable-select * {
        -webkit-user-select: none !important;
        -webkit-touch-callout: none !important;
      }
      :focus-visible:not([data-programmatic-focus='true']) {
        outline: 0;
        box-shadow: inset 0px 0px 0px 1px #5ab0ff;
      }
      input:focus-visible,
      input:focus[data-focusvisible-polyfill],
      select:focus-visible,
      select:focus[data-focusvisible-polyfill] {
        box-shadow: none;
      }
      ::-ms-reveal {
        display: none;
      }

      .splash-logo > svg {
        width: 104px;
        height: 104px;
      }

      #splash {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        top: 0;
        background-color: #0D1117;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        transition-duration: 250ms;
        transition-property: opacity;
        z-index: 10000;
      }

      /*
        Desktop "phone frame" (issue #1219). Kiroku is mobile-first (native
        bottom tabs, no central pane), so above the responsive breakpoint we
        center the app at a phone width on a backdrop rather than show the
        inherited wide layout with a large empty central pane. index.web.js
        clamps the reported viewport width to match, so the app renders its
        normal mobile layout inside this column. Keep the 480px width and the
        801px breakpoint in sync with index.web.js (FRAME_WIDTH / BREAKPOINT).
      */
      @media (min-width: 801px) {
        body {
          background: radial-gradient(
            circle at 50% 30%,
            #2a2a2e 0%,
            #0d0d0f 75%
          );
        }
        #root {
          width: 480px;
          max-width: 100%;
          margin: 0 auto;
          box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }
      }
    </style>
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1, interactive-widget=resizes-content, viewport-fit=cover" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="shortcut icon" id="favicon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <div id="splash">
      <div class="splash-logo"><%= htmlWebpackPlugin.options.splashLogo %></div>
    </div>
  </body>
</html>
