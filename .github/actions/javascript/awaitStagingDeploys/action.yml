name: 'Await staging deploys'
description: 'Waits for any active staging deploys to finish'
inputs:
  GITHUB_TOKEN:
    description: Auth token for Kiroku Github
    required: true
  TAG:
    description: If provided, this action will only wait for deploys on this branch.
    required: false
runs:
  using: 'node20'
  main: './index.js'
