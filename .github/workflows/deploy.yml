name: Deploy code to staging or production

on:
  push:
    branches: [staging, production]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prep:
    name: Prepare deploy metadata
    runs-on: ubuntu-latest
    outputs:
      APP_VERSION: ${{ steps.deploy-metadata.outputs.APP_VERSION }}
      DEPLOY_ENVIRONMENT: ${{ steps.deploy-metadata.outputs.DEPLOY_ENVIRONMENT }}
      PRODUCTION_TAG: ${{ steps.deploy-metadata.outputs.PRODUCTION_TAG }}
      RELEASE_TAG: ${{ steps.deploy-metadata.outputs.RELEASE_TAG }}
      SHOULD_DEPLOY_PRODUCTION: ${{ steps.deploy-metadata.outputs.SHOULD_DEPLOY_PRODUCTION }}
      STAGING_TAG: ${{ steps.deploy-metadata.outputs.STAGING_TAG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get deploy metadata
        id: deploy-metadata
        run: |
          APP_VERSION="$(node -p "require('./package.json').version")"
          STAGING_TAG="${APP_VERSION}-staging"
          PRODUCTION_TAG="${APP_VERSION}"

          if [[ "$GITHUB_REF_NAME" == "production" ]]; then
            DEPLOY_ENVIRONMENT=production
            RELEASE_TAG="$PRODUCTION_TAG"
            SHOULD_DEPLOY_PRODUCTION=true
          else
            DEPLOY_ENVIRONMENT=staging
            RELEASE_TAG="$STAGING_TAG"
            SHOULD_DEPLOY_PRODUCTION=false
          fi

          {
            echo "APP_VERSION=$APP_VERSION"
            echo "DEPLOY_ENVIRONMENT=$DEPLOY_ENVIRONMENT"
            echo "PRODUCTION_TAG=$PRODUCTION_TAG"
            echo "RELEASE_TAG=$RELEASE_TAG"
            echo "SHOULD_DEPLOY_PRODUCTION=$SHOULD_DEPLOY_PRODUCTION"
            echo "STAGING_TAG=$STAGING_TAG"
          } >> "$GITHUB_OUTPUT"

  prepareRelease:
    name: Create or update GitHub Release
    needs: prep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or update deploy release
        env:
          DEPLOY_ENVIRONMENT: ${{ needs.prep.outputs.DEPLOY_ENVIRONMENT }}
          GITHUB_TOKEN: ${{ secrets.KIROKU_ADMIN_TOKEN }}
          RELEASE_TAG: ${{ needs.prep.outputs.RELEASE_TAG }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh api --method PATCH "/repos/$GITHUB_REPOSITORY/git/refs/tags/$RELEASE_TAG" -f "sha=$GITHUB_SHA" -F "force=true"

            if [[ "$DEPLOY_ENVIRONMENT" == "production" ]]; then
              gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --prerelease=false --latest
            else
              gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --prerelease
            fi
            exit 0
          fi

          if [[ "$DEPLOY_ENVIRONMENT" == "production" ]]; then
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes --latest --target "$GITHUB_SHA"
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes --prerelease --target "$GITHUB_SHA"
          fi

      - name: Warn deployers if release preparation failed
        if: ${{ failure() }}
        uses: ./.github/actions/composite/announceFailedWorkflowInDiscord
        with:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

  platformDeploy:
    name: Build and deploy native platforms
    needs: [prep, prepareRelease]
    uses: ./.github/workflows/platformDeploy.yml
    with:
      APP_VERSION: ${{ needs.prep.outputs.APP_VERSION }}
      DEPLOY_ENVIRONMENT: ${{ needs.prep.outputs.DEPLOY_ENVIRONMENT }}
      RELEASE_TAG: ${{ needs.prep.outputs.RELEASE_TAG }}
      SHOULD_DEPLOY_PRODUCTION: ${{ needs.prep.outputs.SHOULD_DEPLOY_PRODUCTION == 'true' }}
      STAGING_TAG: ${{ needs.prep.outputs.STAGING_TAG }}
    secrets: inherit
