name: React Compiler Compliance Check

# PR CI runs via prChecks.yml (the all-green gate); master CI via preDeploy.yml. Both call this
# reusable workflow, so it has no standalone pull_request trigger (avoids double-runs).
on:
  workflow_call:

concurrency:
  group: ${{ github.ref == 'refs/heads/master' && format('{0}-{1}', github.ref, github.sha) || github.ref }}-react-compiler-compliance
  cancel-in-progress: true

jobs:
  react-compiler-compliance:
    name: React Compiler Compliance
    if: ${{ github.actor != 'KirokuAdmin' || github.event_name == 'workflow_call' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Leave `ref` unset so the default `pull_request` merge ref
          # (refs/pull/N/merge = master + this PR) is checked out. The script
          # diffs the working tree against the origin/master tip, so the merge
          # ref is what makes that diff net out to exactly this PR's changes.
          # Do NOT pin this to head.ref, or files changed on master after the
          # branch point would surface as false-positive regressions.
          # fetch-depth: 0 ensures the base commit's objects are present for the diff.
          fetch-depth: 0

      - name: Setup Node
        uses: ./.github/actions/composite/setupNode

      - name: Run React Compiler Compliance Check
        run: npm run react-compiler-compliance-check check-changed
        env:
          CI: true
