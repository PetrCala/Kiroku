name: Capture App Store / Play Store screenshots

# Manual trigger only — App Store screenshots are infrequent, expensive
# (~30-45 min cold build + UI test runs across the device matrix), and require
# demo credentials. Never wire this to `pull_request` or any auto-trigger.
#
# Prerequisite: the demo account referenced by APPLE_DEMO_EMAIL /
# APPLE_DEMO_PASSWORD MUST have at least one logged drinking session in the
# current calendar month. The Day Overview screenshot taps the first
# DayMarking cell in the calendar — if no session exists in-month, the test
# fails. See contributingGuides/SCREENSHOTS.md.
on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Which platform(s) to capture'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - ios-only
          - android-only
      device_subset:
        description: 'iOS device subset (ignored for Android). all | phone-only | ipad-only.'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - phone-only
          - ipad-only
      android_locales_subset:
        description: 'Android locales. Use a single locale for fast iteration.'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - en-US
          - cs-CZ

permissions:
  contents: read

jobs:
  ios:
    name: Capture iOS App Store screenshots
    if: ${{ github.event.inputs.platform != 'android-only' }}
    runs-on: macos-26
    # Build alone is ~35-40 min; once the UI test actually navigates and
    # captures screenshots across every locale (with reinstall_app between
    # captures), the full run can exceed 60 min. 90 gives headroom.
    timeout-minutes: 90
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.1.1.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage .env.production from secret
        run: echo "${{ secrets.PRODUCTION_ENV_FILE }}" > .env.production

      - name: Setup Node
        id: setup-node
        uses: ./.github/actions/composite/setupNode

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.310.0
        with:
          bundler-cache: true

      - name: Cache Pod dependencies
        uses: actions/cache@v4
        id: pods-cache
        with:
          path: |
            ios/Pods
            ios/build/generated
          key: ${{ runner.os }}-pods-cache-${{ hashFiles('ios/Podfile.lock', 'firebase.json', 'package-lock.json') }}
          restore-keys: ${{ runner.os }}-pods-cache-

      - name: Compare Podfile.lock and Manifest.lock
        id: compare-podfile-and-manifest
        run: echo "IS_PODFILE_SAME_AS_MANIFEST=${{ hashFiles('ios/Podfile.lock') == hashFiles('ios/Pods/Manifest.lock') }}" >> "$GITHUB_OUTPUT"

      - name: Install cocoapods
        uses: nick-invision/retry@0711ba3d7808574133d713a0d92d2941be03a350
        if: steps.pods-cache.outputs.cache-hit != 'true' || steps.compare-podfile-and-manifest.outputs.IS_PODFILE_SAME_AS_MANIFEST != 'true' || steps.setup-node.outputs.cache-hit != 'true'
        with:
          timeout_minutes: 10
          max_attempts: 5
          command: cd ios && bundle exec pod install

      - name: Set up environment for Xcode
        run: |
          echo "export NODE_BINARY=$(which node)" >> "$HOME/.bash_profile"
          source "$HOME/.bash_profile"

      # Xcode 26.1.1 on the macos-26 runner image ships without the iOS
      # simulator runtime — xcodebuild crashes with "iOS 26.1 is not installed"
      # otherwise. Same step that testBuild.yml uses.
      - name: Install iOS platform SDK
        run: xcodebuild -downloadPlatform iOS

      # Trim the Snapfile device matrix when the dispatcher asked for a subset.
      # `Snapfile` resolves devices(...) eagerly so we rewrite the file in
      # place — this is throwaway, not committed back.
      - name: Trim Snapfile device matrix
        if: ${{ github.event.inputs.device_subset != 'all' }}
        env:
          DEVICE_SUBSET: ${{ github.event.inputs.device_subset }}
        run: bundle exec ruby scripts/trim-snapfile-devices.rb "$DEVICE_SUBSET"

      - name: Run Fastlane - Capture iOS screenshots
        run: bundle exec fastlane ios screenshots
        env:
          APPLE_DEMO_EMAIL: ${{ secrets.APPLE_DEMO_EMAIL }}
          APPLE_DEMO_PASSWORD: ${{ secrets.APPLE_DEMO_PASSWORD }}
          KIROKU_DEMO_EMAIL: ${{ secrets.APPLE_DEMO_EMAIL }}
          KIROKU_DEMO_PASSWORD: ${{ secrets.APPLE_DEMO_PASSWORD }}

      - name: Upload iOS screenshots
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-screenshots-${{ github.sha }}
          path: fastlane/screenshots/ios/**/*.png
          if-no-files-found: warn
          retention-days: 14

      - name: Upload fastlane logs
        # always() (not failure()) so a timeout-cancelled run still uploads
        # the snapshot log — cancellation is not a failure, and without this
        # a 90-min wall would leave zero diagnostics.
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-fastlane-logs-${{ github.sha }}
          path: |
            ~/Library/Logs/gym/**
            ~/Library/Logs/scan/**
            ~/Library/Logs/snapshot/**
            fastlane/report.xml
            fastlane/screenshots/ios/**/*.log
            fastlane/screenshots/ios/**/system.log
          if-no-files-found: ignore
          retention-days: 7

  android:
    name: Capture Play Store screenshots
    if: ${{ github.event.inputs.platform != 'ios-only' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage .env.production from secret
        run: echo "${{ secrets.PRODUCTION_ENV_FILE }}" > .env.production

      - name: Setup Node
        uses: ./.github/actions/composite/setupNode

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.310.0
        with:
          bundler-cache: true

      - name: Set REACT_NATIVE_DOWNLOADS_DIR
        run: echo "REACT_NATIVE_DOWNLOADS_DIR=$HOME/.rn-downloads" >> "$GITHUB_ENV"

      - name: Cache Gradle and React Native downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.rn-downloads
          key: ${{ runner.os }}-android-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties', 'package-lock.json', 'patches/**') }}
          restore-keys: |
            ${{ runner.os }}-android-gradle-

      # Production-flavor APK is signed with the upload keystore, same as the
      # testBuild + platformDeploy workflows. Decrypt step copied verbatim
      # from testBuild.yml.
      - name: Decrypt keystore
        run: cd android/app && gpg --quiet --batch --yes --decrypt --passphrase="$LARGE_SECRET_PASSPHRASE" --output kiroku-play-key.keystore kiroku-play-key.keystore.gpg
        env:
          LARGE_SECRET_PASSPHRASE: ${{ secrets.LARGE_SECRET_PASSPHRASE }}

      # Trim the Screengrabfile locale list when a subset was selected.
      # Throwaway in-place edit, never committed back. Mirrors the spirit of
      # scripts/trim-snapfile-devices.rb but inline since it's a one-liner.
      - name: Trim Screengrabfile locales
        if: ${{ github.event.inputs.android_locales_subset != 'all' }}
        env:
          LOCALE: ${{ github.event.inputs.android_locales_subset }}
        run: sed -i "s|locales(\[.*\])|locales([\"$LOCALE\"])|" fastlane/Screengrabfile

      # Required on ubuntu-latest for the Android emulator's hardware
      # acceleration. Without it, boot is ~5x slower (software rendering).
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Fastlane - Capture Android screenshots
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-boot-timeout: 600
          disable-animations: true
          disk-size: 6000M
          ram-size: 4096M
          script: bundle exec fastlane android screenshots
        env:
          MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.MYAPP_UPLOAD_STORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.MYAPP_UPLOAD_KEY_PASSWORD }}
          KIROKU_DEMO_EMAIL: ${{ secrets.APPLE_DEMO_EMAIL }}
          KIROKU_DEMO_PASSWORD: ${{ secrets.APPLE_DEMO_PASSWORD }}

      - name: Upload Android screenshots
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: android-screenshots-${{ github.sha }}
          path: fastlane/screenshots/android/**/*.png
          if-no-files-found: warn
          retention-days: 14

      - name: Upload screengrab logs
        # always() so timeout-cancelled runs still upload diagnostics
        # (cancellation is not a failure).
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: android-screengrab-logs-${{ github.sha }}
          path: |
            fastlane/report.xml
            android/app/build/outputs/androidTest-results/**
            android/app/build/reports/androidTests/**
          if-no-files-found: ignore
          retention-days: 7
