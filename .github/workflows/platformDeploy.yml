name: Build and deploy android and iOS clients

on:
  workflow_call:
    inputs:
      APP_VERSION:
        description: App version from package.json
        required: true
        type: string
      DEPLOY_ENVIRONMENT:
        description: Deploy environment derived from the pushed branch
        required: true
        type: string
      RELEASE_TAG:
        description: GitHub Release tag for this deploy
        required: true
        type: string
      SHOULD_DEPLOY_PRODUCTION:
        description: Whether to run production/promotion lanes
        required: true
        type: boolean
      STAGING_TAG:
        description: Staging GitHub Release tag for this app version
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.RELEASE_TAG }}
  cancel-in-progress: true

jobs:
  # Note: we're updating the checklist before running the deploys and assuming that it will succeed on at least one platform
  deployChecklist:
    name: Create or update deploy checklist
    uses: ./.github/workflows/createDeployChecklist.yml
    if: ${{ !inputs.SHOULD_DEPLOY_PRODUCTION }}
    with:
      TAG: ${{ inputs.RELEASE_TAG }}
    secrets: inherit

  android:
    # WARNING: getDeployPullRequestList depends on this job name. do not change job name without adjusting that action accordingly
    name: Build and deploy Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ubuntu-latest ships with ~14 GB free; an RN Android release build
      # (Gradle cache + .rn-downloads + Hermes + AAB) exhausts it. Reclaim
      # ~20-30 GB by removing preinstalled toolchains we don't use.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: false # keep the Android SDK the build needs
          dotnet: true
          haskell: true
          large-packages: false # apt autoremove purges libicu-dev, breaking Hermes' CMake ICU lookup
          docker-images: true
          swap-storage: true

      - name: Setup Node
        uses: ./.github/actions/composite/setupNode

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.310.0
        with:
          bundler-cache: true

      - name: Set REACT_NATIVE_DOWNLOADS_DIR
        run: echo "REACT_NATIVE_DOWNLOADS_DIR=$HOME/.rn-downloads" >> "$GITHUB_ENV"

      - name: Cache Gradle and React Native downloads (Boost, etc.)
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.rn-downloads
          key: ${{ runner.os }}-android-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties', 'package-lock.json', 'patches/**') }}
          restore-keys: |
            ${{ runner.os }}-android-gradle-

      - name: Decrypt keystore
        run: cd android/app && gpg --quiet --batch --yes --decrypt --passphrase="$LARGE_SECRET_PASSPHRASE" --output kiroku-play-key.keystore kiroku-play-key.keystore.gpg
        env:
          LARGE_SECRET_PASSPHRASE: ${{ secrets.LARGE_SECRET_PASSPHRASE }}

      - name: Decrypt json key
        run: cd android/app && gpg --quiet --batch --yes --decrypt --passphrase="$LARGE_SECRET_PASSPHRASE" --output android-fastlane-json-key.json android-fastlane-json-key.json.gpg
        env:
          LARGE_SECRET_PASSPHRASE: ${{ secrets.LARGE_SECRET_PASSPHRASE }}

      - name: Create the .env files
        run: |
          echo "${{ secrets.STAGING_ENV_FILE }}" > .env.staging
          echo "${{ secrets.PRODUCTION_ENV_FILE }}" > .env.production

      - name: Set version in ENV
        run: echo "VERSION_CODE=$(grep -o 'versionCode\s\+[0-9]\+' android/app/build.gradle | awk '{ print $2 }')" >> "$GITHUB_ENV"

      - name: Run Fastlane
        uses: nick-fields/retry@3f757583fb1b1f940bc8ef4bf4734c8dc02a5847
        with:
          # A cold build compiles RN, Hermes, Skia, etc. from source (~65-75 min);
          # a timeout below that kills attempt 1 mid-build and retries resume on its intermediates
          timeout_minutes: 90
          max_attempts: 3
          command: bundle exec fastlane android ${{ inputs.SHOULD_DEPLOY_PRODUCTION && 'production' || 'beta' }}
          # A killed attempt can leave native intermediates Gradle wrongly considers
          # up-to-date (truncated prefab .so files); retries must not reuse them
          on_retry_command: rm -rf node_modules/*/android/build android/app/.cxx
        env:
          MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.MYAPP_UPLOAD_STORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.MYAPP_UPLOAD_KEY_PASSWORD }}
          VERSION: ${{ env.VERSION_CODE }}

      # - name: Upload Android build to Browser Stack
      #   if: ${{ !inputs.SHOULD_DEPLOY_PRODUCTION }}
      #   run: curl -u "$BROWSERSTACK" -X POST "https://api-cloud.browserstack.com/app-live/upload" -F "file=@./android/app/build/outputs/bundle/productionRelease/app-production-release.aab"
      #   env:
      #     BROWSERSTACK: ${{ secrets.BROWSERSTACK }}

      - name: Upload Android sourcemaps to GitHub Release
        if: ${{ !inputs.SHOULD_DEPLOY_PRODUCTION }}
        run: gh release upload ${{ inputs.RELEASE_TAG }} android/app/build/generated/sourcemaps/react/productionRelease/index.android.bundle.map#android-sourcemap-${{ inputs.RELEASE_TAG }} --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.KIROKU_ADMIN_TOKEN }}

      - name: Upload Android build to GitHub Release
        if: ${{ !inputs.SHOULD_DEPLOY_PRODUCTION }}
        run: gh release upload ${{ inputs.RELEASE_TAG }} android/app/build/outputs/bundle/productionRelease/app-production-release.aab --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.KIROKU_ADMIN_TOKEN }}

      - name: Warn deployers if Android production deploy failed
        if: ${{ failure() }}
        uses: ./.github/actions/composite/announceFailedWorkflowInDiscord
        with:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

  iOS:
    # WARNING: getDeployPullRequestList depends on this job name. do not change job name without adjusting that action accordingly
    name: Build and deploy iOS
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.1.1.app/Contents/Developer
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        id: setup-node
        uses: ./.github/actions/composite/setupNode

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.310.0
        with:
          bundler-cache: true

      - name: Cache Pod dependencies
        uses: actions/cache@v5
        id: pods-cache
        with:
          path: |
            ios/Pods
            ios/build/generated
          key: ${{ runner.os }}-pods-cache-${{ hashFiles('ios/Podfile.lock', 'firebase.json', 'package-lock.json') }}

      - name: Compare Podfile.lock and Manifest.lock
        id: compare-podfile-and-manifest
        run: echo "IS_PODFILE_SAME_AS_MANIFEST=${{ hashFiles('ios/Podfile.lock') == hashFiles('ios/Pods/Manifest.lock') }}" >> "$GITHUB_OUTPUT"

      - name: Install cocoapods
        uses: nick-fields/retry@3f757583fb1b1f940bc8ef4bf4734c8dc02a5847
        if: steps.pods-cache.outputs.cache-hit != 'true' || steps.compare-podfile-and-manifest.outputs.IS_PODFILE_SAME_AS_MANIFEST != 'true' || steps.setup-node.outputs.cache-hit != 'true'
        with:
          timeout_minutes: 10
          max_attempts: 5
          command: scripts/pod-install.sh

      - name: Decrypt AppStore profile
        run: cd ios && gpg --quiet --batch --yes --decrypt --passphrase="$LARGE_SECRET_PASSPHRASE" --output Kiroku.mobileprovision Kiroku.mobileprovision.gpg
        env:
          LARGE_SECRET_PASSPHRASE: ${{ secrets.LARGE_SECRET_PASSPHRASE }}

      - name: Decrypt watch AppStore profile
        run: cd ios && gpg --quiet --batch --yes --decrypt --passphrase="$LARGE_SECRET_PASSPHRASE" --output KirokuWatch.mobileprovision KirokuWatch.mobileprovision.gpg
        env:
          LARGE_SECRET_PASSPHRASE: ${{ secrets.LARGE_SECRET_PASSPHRASE }}

      - name: Decrypt certificate
        run: cd ios && gpg --quiet --batch --yes --decrypt --passphrase="$LARGE_SECRET_PASSPHRASE" --output Certificates.p12 Certificates.p12.gpg
        env:
          LARGE_SECRET_PASSPHRASE: ${{ secrets.LARGE_SECRET_PASSPHRASE }}

      - name: Decrypt App Store Connect API key
        run: cd ios && gpg --quiet --batch --yes --decrypt --passphrase="$LARGE_SECRET_PASSPHRASE" --output ios-fastlane-json-key.json ios-fastlane-json-key.json.gpg
        env:
          LARGE_SECRET_PASSPHRASE: ${{ secrets.LARGE_SECRET_PASSPHRASE }}

      - name: Create the .env files
        run: |
          echo "${{ secrets.STAGING_ENV_FILE }}" > .env.staging
          echo "${{ secrets.PRODUCTION_ENV_FILE }}" > .env.production

      - name: Set iOS version in ENV
        run: echo "IOS_VERSION=$(echo '${{ inputs.APP_VERSION }}' | tr '-' '.')" >> "$GITHUB_ENV"

      - name: Install iOS platform SDK
        uses: nick-fields/retry@3f757583fb1b1f940bc8ef4bf4734c8dc02a5847
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          # `xcodebuild -downloadPlatform iOS` intermittently fails with
          # "Unable to connect to simulator." (exit 70) when CoreSimulator
          # isn't ready yet on a fresh runner. Retry instead of failing the deploy.
          command: xcodebuild -downloadPlatform iOS

      - name: Install watchOS platform SDK
        uses: nick-fields/retry@3f757583fb1b1f940bc8ef4bf4734c8dc02a5847
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_wait_seconds: 30
          # The app archive embeds the Apple Watch app, so xcodebuild refuses to
          # archive the scheme unless the matching watchOS platform is installed
          # ("watchOS … must be installed in order to archive the scheme"). Same
          # flaky "Unable to connect to simulator." retry rationale as iOS above.
          command: xcodebuild -downloadPlatform watchOS

      - name: Generate release notes
        if: ${{ inputs.SHOULD_DEPLOY_PRODUCTION }}
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash scripts/generateReleaseNotes.sh

      - name: Run Fastlane
        uses: nick-fields/retry@3f757583fb1b1f940bc8ef4bf4734c8dc02a5847
        with:
          # The iOS archive+upload took ~27 min in a single attempt, so 60 min
          # comfortably exceeds one full `fastlane ios` lane re-run. Retry guards
          # against transient App Store Connect failures (e.g. altool HTTP 500
          # during the upload-complete step), mirroring the Android step above.
          timeout_minutes: 60
          max_attempts: 3
          retry_wait_seconds: 30
          command: bundle exec fastlane ios ${{ inputs.SHOULD_DEPLOY_PRODUCTION && 'production' || 'beta' }}
        env:
          APPLE_CONTACT_EMAIL: ${{ secrets.APPLE_CONTACT_EMAIL }}
          APPLE_CONTACT_PHONE: ${{ secrets.APPLE_CONTACT_PHONE }}
          APPLE_DEMO_EMAIL: ${{ secrets.APPLE_DEMO_EMAIL }}
          APPLE_DEMO_PASSWORD: ${{ secrets.APPLE_DEMO_PASSWORD }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          VERSION: ${{ env.IOS_VERSION }}
          TESTFLIGHT_CHANGELOG: ${{ env.TESTFLIGHT_CHANGELOG }}
          # `xcodebuild -showBuildSettings` on this workspace can take much
          # longer than fastlane's 3s default × 4 retries (~45s total),
          # especially on a fresh-SDK install pass. Bump both knobs so the
          # build_app step doesn't time out before xcodebuild has answered.
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: '120'
          FASTLANE_XCODEBUILD_SETTINGS_RETRIES: '5'

      # Preserve the dSYM as a workflow artifact so we can symbolicate native
      # crash reports later without trips to App Store Connect. Fastlane's
      # build_app emits *.app.dSYM.zip next to the IPA in the workspace; the
      # path glob also catches ios/ in case future changes move the output.
      # Runs on always() so failures in upload_to_testflight still preserve
      # the dSYM for debugging.
      - name: Stash iOS dSYM as workflow artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ios-dsym-${{ inputs.APP_VERSION }}
          path: |
            ./*.app.dSYM.zip
            ios/*.app.dSYM.zip
          retention-days: 90
          if-no-files-found: warn

      # - name: Upload iOS build to Browser Stack
      #   if: ${{ !inputs.SHOULD_DEPLOY_PRODUCTION }}
      #   run: curl -u "$BROWSERSTACK" -X POST "https://api-cloud.browserstack.com/app-live/upload" -F "file=@/Users/runner/work/App/App/kiroku.ipa"
      #   env:
      #     BROWSERSTACK: ${{ secrets.BROWSERSTACK }}

      - name: Upload iOS sourcemaps to GitHub Release
        if: ${{ !inputs.SHOULD_DEPLOY_PRODUCTION }}
        run: gh release upload ${{ inputs.RELEASE_TAG }} main.jsbundle.map#ios-sourcemap-${{ inputs.RELEASE_TAG }} --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.KIROKU_ADMIN_TOKEN }}

      - name: Upload iOS build to GitHub Release
        if: ${{ !inputs.SHOULD_DEPLOY_PRODUCTION }}
        run: gh release upload ${{ inputs.RELEASE_TAG }} "$GITHUB_WORKSPACE/kiroku.ipa" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.KIROKU_ADMIN_TOKEN }}

      - name: Warn deployers if iOS production deploy failed
        if: ${{ failure() }}
        uses: ./.github/actions/composite/announceFailedWorkflowInDiscord
        with:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

  copyProductionReleaseAssets:
    name: Copy staging assets to production release
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && inputs.SHOULD_DEPLOY_PRODUCTION && (needs.android.result == 'success' || needs.iOS.result == 'success') }}
    needs: [android, iOS]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Copy release assets
        env:
          GITHUB_TOKEN: ${{ secrets.KIROKU_ADMIN_TOKEN }}
          RELEASE_TAG: ${{ inputs.RELEASE_TAG }}
          STAGING_TAG: ${{ inputs.STAGING_TAG }}
        run: |
          set -euo pipefail

          mkdir -p release-assets
          gh release download "$STAGING_TAG" --dir release-assets

          shopt -s nullglob
          assets=(release-assets/*)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "::error::No assets found on staging release $STAGING_TAG"
            exit 1
          fi

          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber

      - name: Warn deployers if production asset copy failed
        if: ${{ failure() }}
        uses: ./.github/actions/composite/announceFailedWorkflowInDiscord
        with:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

  postDiscordMessageOnFailure:
    name: Post a Discord message when any platform fails to build or deploy
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && (needs.android.result == 'failure' || needs.iOS.result == 'failure' || needs.copyProductionReleaseAssets.result == 'failure') }}
    needs: [android, iOS, copyProductionReleaseAssets]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Warn deployers if staging deploy failed
        uses: ./.github/actions/composite/announceFailedWorkflowInDiscord
        with:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

  postDiscordMessageOnSuccess:
    name: Post a Discord message when all platforms deploy successfully
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && needs.android.result == 'success' && needs.iOS.result == 'success' && (needs.copyProductionReleaseAssets.result == 'success' || needs.copyProductionReleaseAssets.result == 'skipped') }}
    needs: [android, iOS, copyProductionReleaseAssets]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: 'Announces the deploy in the #announce Discord channel'
        shell: bash
        run: |
          APP_VERSION="${{ inputs.APP_VERSION }}"
          # The in-app version gate uses the marketing version (MAJOR.MINOR.PATCH),
          # so drop the build suffix (e.g. 0.3.16-14 -> 0.3.16).
          CLI_VERSION="${APP_VERSION%-*}"
          DESCRIPTION="Successfully deployed Kiroku [${{ inputs.RELEASE_TAG }}](https://github.com/PetrCala/Kiroku/releases/tag/${{ inputs.RELEASE_TAG }}) to ${{ inputs.DEPLOY_ENVIRONMENT }}"
          # Production builds are deployed but not public yet: iOS is submitted to
          # App Store review and held as Pending Developer Release (automatic_release:
          # false); Android is promoted to the open-testing track (held by Managed
          # publishing). Remind a human of the manual steps to go fully public.
          if [[ "${{ inputs.SHOULD_DEPLOY_PRODUCTION }}" == "true" ]]; then
            DESCRIPTION="${DESCRIPTION}\n\n📌 v${CLI_VERSION} is deployed but not public yet. Manual steps to go live:\n• App Store: release it from 'Pending Developer Release' once Apple approves\n• Google Play: publish the open-testing release (Managed publishing), then promote it to production\n\nOnce v${CLI_VERSION} is public on both, bump the in-app update prompt:\n\`kiroku-cli app-version set --latest ${CLI_VERSION}\`"
          fi
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"\",\"embeds\":[{\"title\":\"Deploy Successful\",\"color\":3066993,\"description\":\"${DESCRIPTION}\",\"footer\":{\"text\":\"GitHub Actions\",\"icon_url\":\"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\"}}]}"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

  #     - name: 'Announces the deploy in the #deployer Slack room'
  #       uses: 8398a7/action-slack@v3
  #       with:
  #         status: custom
  #         custom_payload: |
  #           {
  #             channel: '#deployer',
  #             attachments: [{
  #               color: 'good',
  #               text: `🎉️ Successfully deployed ${process.env.AS_REPO} <https://github.com/PetrCala/Kiroku/releases/tag/${{ env.VERSION }}|${{ env.VERSION }}> to ${{ fromJSON(env.SHOULD_DEPLOY_PRODUCTION) && 'production' || 'staging' }} 🎉️`,
  #             }]
  #           }
  #       env:
  #         GITHUB_TOKEN: ${{ github.token }}
  #         SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  #     - name: 'Announces a production deploy in the #kiroku-open-source Slack room'
  #       uses: 8398a7/action-slack@v3
  #       if: ${{ fromJSON(env.SHOULD_DEPLOY_PRODUCTION) }}
  #       with:
  #         status: custom
  #         custom_payload: |
  #           {
  #             channel: '#kiroku-open-source',
  #             attachments: [{
  #               color: 'good',
  #               text: `🎉️ Successfully deployed ${process.env.AS_REPO} <https://github.com/PetrCala/Kiroku/releases/tag/${{ env.VERSION }}|${{ env.VERSION }}> to production 🎉️`,
  #             }]
  #           }
  #       env:
  #         GITHUB_TOKEN: ${{ github.token }}
  #         SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  postGithubComment:
    name: Post a GitHub comment when platforms are done building and deploying
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    needs: [android, iOS]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: ./.github/actions/composite/setupNode

      - name: Get Release Pull Request List
        id: getReleasePRList
        uses: ./.github/actions/javascript/getDeployPullRequestList
        with:
          TAG: ${{ inputs.RELEASE_TAG }}
          GITHUB_TOKEN: ${{ secrets.KIROKU_ADMIN_TOKEN }}
          IS_PRODUCTION_DEPLOY: ${{ inputs.SHOULD_DEPLOY_PRODUCTION }}

      - name: Comment on issues
        uses: ./.github/actions/javascript/markPullRequestsAsDeployed
        with:
          PR_LIST: ${{ steps.getReleasePRList.outputs.PR_LIST }}
          IS_PRODUCTION_DEPLOY: ${{ inputs.SHOULD_DEPLOY_PRODUCTION }}
          DEPLOY_VERSION: ${{ inputs.RELEASE_TAG }}
          GITHUB_TOKEN: ${{ secrets.KIROKU_ADMIN_TOKEN }}
          ANDROID: ${{ needs.android.result }}
          IOS: ${{ needs.iOS.result }}
