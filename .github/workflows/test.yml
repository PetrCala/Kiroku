name: Jest Unit Tests

# PR CI runs via prChecks.yml (the all-green gate); master CI via preDeploy.yml. Both call this
# reusable workflow, so it has no standalone pull_request trigger (avoids double-runs).
on:
  workflow_call:

concurrency:
  group: ${{ github.ref == 'refs/heads/master' && format('{0}-{1}', github.ref, github.sha) || github.ref }}-jest
  cancel-in-progress: true

jobs:
  jest:
    if: ${{ github.actor != 'KirokuAdmin' && github.actor != 'imgbot[bot]' || github.event_name == 'workflow_call' }}
    runs-on: ubuntu-latest
    env:
      CI: true
    strategy:
      fail-fast: false
      matrix:
        chunk: [1, 2, 3]
    name: test (job ${{ fromJSON(matrix.chunk) }})
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: ./.github/actions/composite/setupNode

      - name: Get number of CPU cores
        id: cpu-cores
        uses: SimenB/github-actions-cpu-cores@31e91de0f8654375a21e8e83078be625380e2b18

      - name: Cache Jest cache
        id: cache-jest-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .jest-cache
          key: ${{ runner.os }}-jest-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-jest-

      - name: Jest tests
        run: npx jest --silent --shard=${{ fromJSON(matrix.chunk) }}/${{ strategy.job-total }} --max-workers ${{ steps.cpu-cores.outputs.count }}
